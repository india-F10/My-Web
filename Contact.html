<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <nav>
            <div class="logo">
                <img src="LYLB2911.JPG" alt="Logo">
            </div>
        </nav>

        <div class="content">

            <div class="left">

                <h1>CONTACT US</h1>

                <p>
                    we love to hear from you. Fill in the form below and we'll get to you as soon as possible.container

                <form>

                    <input type="text" placeholder="Name" required>

                    <input type="email" placeholder="Email" required>

                    <button>Submit</button>

            </div>

            <div class="right">

                <img src="IMG_3132.JPG" alt="Contact image">

            </div>

        </div>

    </div>
